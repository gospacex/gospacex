global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 日志库指标（你的微服务）
  - job_name: 'gpx-services'
    static_configs:
      - targets: 
        - 'host.docker.internal:8080'  # BFF
        - 'host.docker.internal:8081'  # SRV
    metrics_path: /metrics
