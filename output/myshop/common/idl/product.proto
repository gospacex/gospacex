syntax = "proto3";
package product;
option go_package = "myshop/common/kitexGen/product";

service ProductService {
  rpc Create(CreateProductReq) returns (CreateProductResp);
  rpc Get(GetProductReq) returns (GetProductResp);
  rpc List(ListProductReq) returns (ListProductResp);
  rpc Update(UpdateProductReq) returns (UpdateProductResp);
  rpc Delete(DeleteProductReq) returns (DeleteProductResp);
}

// Create 请求
message CreateProductReq {
  int64 mer_id = 2; // 商户Id(0为总后台管理员创建,不为0的时候是商户后台创建)
  string image = 3; // 商品图片
  string recommend_image = 4; // 推荐图
  string slider_image = 5; // 轮播图
  string store_name = 6; // 商品名称
  string store_info = 7; // 商品简介
  string keyword = 8; // 关键字
  string bar_code = 9; // 商品条码（一维码）
  string cate_id = 10; // 分类id
  double price = 11; // 商品价格
  double vip_price = 12; // 会员价格
  double ot_price = 13; // 市场价
  double postage = 14; // 邮费
  string unit_name = 15; // 单位名
  int64 sort = 16; // 排序
  int64 sales = 17; // 销量
  int64 stock = 18; // 库存
  bool is_show = 19; // 状态（0：未上架，1：上架）
  bool is_hot = 20; // 是否热卖
  bool is_benefit = 21; // 是否优惠
  bool is_best = 22; // 是否精品
  bool is_new = 23; // 是否新品
  bool is_virtual = 24; // 商品是否是虚拟商品
  int64 virtual_type = 25; // 虚拟商品类型
  int64 add_time = 26; // 添加时间
  bool is_postage = 27; // 是否包邮
  bool is_del = 28; // 是否删除
  int64 mer_use = 29; // 商户是否代理 0不可代理1可代理
  int64 give_integral = 30; // 获得积分
  double cost = 31; // 成本价
  bool is_seckill = 32; // 秒杀状态 0 未开启 1已开启
  bool is_bargain = 33; // 砍价状态 0未开启 1开启
  bool is_good = 34; // 是否优品推荐
  bool is_sub = 35; // 是否单独分佣
  bool is_vip = 36; // 是否开启会员价格
  int64 ficti = 37; // 虚拟销量
  int64 browse = 38; // 浏览量
  string code_path = 39; // 商品二维码地址(用户小程序海报)
  string soure_link = 40; // 淘宝京东1688类型
  string video_link = 41; // 主图视频链接
  int64 temp_id = 42; // 运费模板ID
  int64 spec_type = 43; // 规格 0单 1多
  string activity = 44; // 活动显示排序1=秒杀，2=砍价，3=拼团
  string spu = 45; // 商品SPU
  string label_id = 46; // 标签ID
  string command_word = 47; // 复制口令
  string recommend_list = 48; // 推荐商品id
  int64 vip_product = 49; // 是否会员专属商品
  int64 presale = 50; // 是否预售商品
  int64 presale_start_time = 51; // 预售开始时间
  int64 presale_end_time = 52; // 预售结束时间
  int64 presale_day = 53; // 预售结束后几天内发货
  string logistics = 54; // 物流方式
  int64 freight = 55; // 运费设置
  string custom_form = 56; // 自定义表单
  bool is_limit = 57; // 是否开启限购
  int64 limit_type = 58; // 限购类型1单次限购2永久限购
  int64 limit_num = 59; // 限购数量
  int64 min_qty = 60; // 起购数量
  string default_sku = 61; // 默认规格
  string params_list = 62; // 商品参数
  string label_list = 63; // 商品标签
  string protection_list = 64; // 商品保障
  int64 is_gift = 65; // 是否是礼品
  double gift_price = 66; // 礼品附加费
}

message CreateProductResp {
  int64 id = 1;
}

